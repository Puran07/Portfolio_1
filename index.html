<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Singh | Digital Links</title>
    <meta
      name="description"
      content="Arjun Singh, Software Developer. Call, WhatsApp, email, website, social links, maps, and contact card."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="profile-card">
        <p class="eyebrow">Digital Card</p>

        <section class="hero">
          <img
            class="profile-photo"
            src="./profile-photo.svg"
            alt="Profile placeholder for Arjun Singh"
          />

          <div class="identity">
            <h1 id="profile-name">Arjun Singh</h1>
            <p id="profile-title">Software Developer</p>
          </div>
        </section>

        <section aria-label="Quick contact actions" class="quick-actions" id="quick-actions"></section>

        <section class="links-section">
          <div class="section-heading">
            <h2>Connect</h2>
            <p>Simple, mobile-first, and ready for free hosting.</p>
          </div>
          <div class="link-list" id="link-list"></div>
        </section>

        <footer class="card-footer">
          <p>Replace the sample links in <code>site.js</code> with your real details before publishing.</p>
        </footer>
      </main>
    </div>

    <script src="./site.js"></script>
  </body>
</html>
